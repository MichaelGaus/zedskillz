services:
  postgres:
    image: postgres:16-alpine
    container_name: zedskillz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zedskillz
      POSTGRES_PASSWORD: zedskillz_secret
      POSTGRES_DB: zedskillz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zedskillz"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: zedskillz-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://zedskillz:zedskillz_secret@postgres:5432/zedskillz"
      NODE_ENV: production
      NEXTAUTH_SECRET: "change-me-to-a-random-secret-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
